<!DOCTYPE html>
<html lang="en" dir="ltr">
  
  <head>
    <meta charset="utf-8">
    <title>Alperen Olcer</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="static/app.js" charset="utf-8"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <button class="box">Welcome! It's Play Time! Crush items to unlock hidden areas.</button>
    <button class="btn" id="showButton">Show all hidden</button>

    <div class="score-boards-container">
      <div class="score-board">
        <h3>score</h3>
        <h1 id="score_journey"></h1>
        <div class="bar-container">
          <div class="bar" id="bar_journey"></div>
          <a href="https://www.alperenlcr.net/my-journey" id="btn_journey" target="_blank" class="hidden">My Journey</a>
        </div>
      </div>
      <div class="score-board">
        <h3>score</h3>
        <h1 id="score_cv"></h1>
        <div class="bar-container">
          <div class="bar" id="bar_cv"></div>
          <a href="https://www.alperenlcr.net/cv" id="btn_cv" target="_blank" class="hidden">CV</a>
        </div>
      </div>
    </div>
    <div class="grid"></div>
    <div class="score-boards-container">
      <div class="score-board">
        <h3>score</h3>
        <h1 id="score_projects"></h1>
        <div class="bar-container">
          <div class="bar" id="bar_projects"></div>
          <a href="https://www.alperenlcr.net/projects" id="btn_projects" target="_blank" class="hidden">Projects</a>
        </div>
      </div>
      <div class="score-board">
        <h3>score</h3>
        <h1 id="score_contact"></h1>
        <div class="bar-container">
          <div class="bar" id="bar_contact"></div>
          <a href="https://www.alperenlcr.net/contact" id="btn_contact" target="_blank" class="hidden">Contact</a>
        </div>
      </div>
    </div>
  </body>
</html>
